<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACESSO RESTRITO :: DIRPINFSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-[#0a0a0a] p-8 sm:p-12 rounded-[2.5rem] shadow-2xl border border-[#1a1a1a] fade-in">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-semibold text-white tracking-tight">DIRPINFSA</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium uppercase tracking-[0.1em]">Sistema de Acesso</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="password" class="block text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-2 ml-1">Senha de Acesso</label>
                <input type="password" id="password" 
                       class="w-full p-4 bg-[#111] border border-[#222] text-white rounded-2xl focus:outline-none focus:border-white transition-all text-sm"
                       placeholder="••••••••"
                       onkeypress="if(event.key === 'Enter') verificarSenha()">
            </div>
            
            <button onclick="verificarSenha()" 
                    class="block w-full p-4 bg-white text-black rounded-2xl hover:bg-slate-200 transition-all active:scale-[0.98] font-bold text-sm uppercase tracking-tight">
                Entrar no Sistema
            </button>
            
            <p id="erro" class="text-red-500 text-[11px] text-center font-medium h-4 mt-2"></p>
        </div>

        <div class="mt-12 pt-6 border-t border-[#151515] flex justify-center items-center text-[10px] text-slate-700 font-bold uppercase tracking-widest">
            <span>Acesso Restrito à Diretoria</span>
        </div>
    </div>

    <script>
        function verificarSenha() {
            const senha = document.getElementById('password').value.toLowerCase();
            const erro = document.getElementById('erro');
            
            // Dicionário de senhas e destinos atualizado com DIRPIN-LESTE
            const acessos = {
                "feira123": "feira/index.html",
                "alagoinhas123": "alagoinhas/index.html",
                "dirpinleste123": "DIRPIN-LESTE/index.html",
                "santoamaro123": "santoamaro/index.html",
                "saj123": "santoantoniodejesus/index.html",
                "serrinha123": "serrinha/index.html"
            };

            if (acessos[senha]) {
                erro.innerText = "Acesso autorizado. Redirecionando...";
                erro.classList.replace('text-red-500', 'text-green-500');
                setTimeout(() => {
                    window.location.href = acessos[senha];
                }, 500);
            } else {
                erro.innerText = "Senha incorreta. Tente novamente.";
            }
        }
    </script>

</body>
</html>
