<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Dados em Tempo Real</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        .status { font-size: 0.9em; color: #666; margin-bottom: 25px; display: flex; align-items: center; }
        .ponto { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 8px; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            overflow: hidden;
            border-radius: 8px;
        }
        th, td { 
            padding: 12px 15px; 
            text-align: left; 
            border-bottom: 1px solid #eee;
        }
        th { 
            background-color: #1a73e8; 
            color: white; 
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        tr:hover { background-color: #f8f9fa; }
        .erro { color: #d93025; background: #fce8e6; padding: 15px; border-radius: 6px; border: 1px solid #fad2cf; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Monitorização de Dados</h1>
        <div class="status"><span class="ponto"></span> Ligado à Planilha1 - Atualização automática</div>
        
        <div id="tabela-conteudo">A carregar dados do Google Drive...</div>
    </div>

    <script>
        const sheetId = '1ur2C6eDdQvtYi8pt4JCCPm52_cnnKYXX';
        const apiKey = 'AIzaSyA9_5NqK7MMJgPPpymmRPbFjg_uMUlF0N0';
        const nomeDaAba = 'Planilha1'; 
        const range = `${nomeDaAba}!A:Z`; 

        const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

        async function obterDados() {
            try {
                const res = await fetch(url);
                const json = await res.json();
                
                if (json.error) {
                    mostrarErro(json.error.message);
                    return;
                }

                const linhas = json.values;
                if (!linhas || linhas.length === 0) {
                    document.getElementById('tabela-conteudo').innerHTML = '<p>A folha está vazia.</p>';
                    return;
                }

                let tabelaHtml = '<table><thead><tr>';
                
                // Cabeçalho
                linhas[0].forEach(cabecalho => {
                    tabelaHtml += `<th>${cabecalho}</th>`;
                });
                tabelaHtml += '</tr></thead><tbody>';

                // Linhas de dados
                for (let i = 1; i < linhas.length; i++) {
                    tabelaHtml += '<tr>';
                    linhas[i].forEach(celula => {
                        tabelaHtml += `<td>${celula || ''}</td>`;
                    });
                    tabelaHtml += '</tr>';
                }
                
                tabelaHtml += '</tbody></table>';
                document.getElementById('tabela-conteudo').innerHTML = tabelaHtml;

            } catch (e) {
                mostrarErro("Não foi possível ligar ao servidor do Google.");
            }
        }

        function mostrarErro(msg) {
            document.getElementById('tabela-conteudo').innerHTML = `
                <div class="erro">
                    <strong>Erro de Ligação:</strong> ${msg}<br>
                    <small>Certifique-se de que a folha está partilhada como "Qualquer pessoa com o link".</small>
                </div>`;
        }

        // Inicia a primeira carga
        obterDados();

        // Atualiza a cada 15 segundos
        setInterval(obterDados, 15000);
    </script>
</body>
</html>
