<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custódia de Presos - Polícia Civil BA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-black min-h-screen font-sans text-gray-300 relative overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-800 w-full max-w-md relative">
            <div class="text-center mb-8">
                <div class="mx-auto bg-gray-800 w-16 h-16 rounded-full flex items-center justify-center mb-4 border border-gray-700 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-white uppercase tracking-wider">Acesso Restrito</h2>
                <p class="text-gray-400 mt-2 text-sm">Sistema de Custódia - 1ª COORPIN</p>
            </div>

            <form onsubmit="fazerLogin(event)" class="space-y-5">
                <div>
                    <label for="usuario" class="block text-sm font-medium text-gray-400 mb-1">Usuário</label>
                    <input type="text" id="usuario" required class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Digite seu usuário">
                </div>
                <div>
                    <label for="senha" class="block text-sm font-medium text-gray-400 mb-1">Senha</label>
                    <input type="password" id="senha" required class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Digite sua senha">
                </div>
                
                <p id="erro-login" class="text-red-500 text-sm hidden font-medium text-center bg-red-500/10 py-2 rounded border border-red-500/20">Usuário ou senha incorretos!</p>

                <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300 shadow-lg shadow-blue-900/20 mt-2">
                    Entrar no Sistema
                </button>
            </form>
            <div class="mt-6 text-center border-t border-gray-800 pt-4">
                <p class="text-xs text-gray-500">Credenciais: <strong>dirpin</strong> | <strong>15134612</strong></p>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden p-4 md:p-8 h-screen overflow-y-auto">

        <header class="text-center mb-8 max-w-7xl mx-auto bg-gray-900 p-6 rounded-xl shadow-lg border border-gray-800">
            <h1 class="text-2xl md:text-3xl font-bold text-white uppercase tracking-wide">Secretaria de Segurança Pública<br><span class="text-lg md:text-xl text-gray-400 font-semibold">Polícia Civil da Bahia</span></h1>
            <div class="w-24 h-1 bg-blue-600 mx-auto my-4 rounded"></div>
            <h2 class="text-lg md:text-xl font-medium text-gray-300">1ª COORPIN – Feira de Santana</h2>
            <h3 class="text-md text-gray-500 font-bold mt-1 tracking-widest uppercase">Custódia de Presos</h3>
        </header>

        <div class="max-w-7xl
